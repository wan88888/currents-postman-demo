name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CURRENTS_RECORD_KEY: ${{ secrets.CURRENTS_RECORD_KEY }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Postman tests and report to Currents
        run: |
          npx newman run ./collection.json -r cli,junit --reporter-junit-export ./results.xml && \
          npx currents convert --input-format=junit --input-file=./results.xml --framework=postman && \
          npx currents upload --key=$CURRENTS_RECORD_KEY --project-id=gnRUTN
